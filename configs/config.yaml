app:
  name: stock-agent
  env: demo
  timezone: America/New_York
provider:
  default: csv_demo
  csv_demo:
    path: data/sample/sample_bars.csv
  live:
    name: placeholder
    api_key_env: MARKET_DATA_API_KEY
symbols:
  default:
    - AAPL
    - MSFT
    - NVDA
bar:
  interval: 30m
  session: regular_only
  include_pre_market: false
  include_after_hours: false
strategies:
  ma_cross:
    enabled: true
    pairs:
      - [3, 5]
      - [5, 10]
      - [10, 20]
  boll:
    enabled: true
    window: 20
    bandwidth_baseline_window: 20
  macd:
    enabled: false
    fast: 12
    slow: 26
    signal: 9
  kdj:
    enabled: false
    window: 9
telegram:
  enabled: false
  token_env: TELEGRAM_BOT_TOKEN
  allowed_user_ids: []
news:
  enabled: true
  mode: on_demand
  provider: placeholder
  api_key_env: NEWS_API_KEY
  cache_ttl_minutes: 30
llm:
  enabled: false
  provider: openai
  model: gpt-4.1-mini
  api_key_env: OPENAI_API_KEY
storage:
  sqlite_path: data/runtime/stock_agent.sqlite
  parquet_root: data/lake
  duckdb_path: data/analytics/stock_agent.duckdb
health:
  heartbeat_timeout_sec: 300
  data_delay_degraded_sec: 60
  data_delay_unhealthy_sec: 300
  error_rate_degraded: 0.01
  error_rate_unhealthy: 0.05
  consecutive_failure_unhealthy: 3
