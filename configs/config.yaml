app:
  name: stock-agent
  env: demo
  timezone: America/New_York
provider:
  default: twelve_data
  priority:
    - twelve_data
  fallback:
    enabled: true
    order:
      - synthetic_demo
  twelve_data:
    api_key_env: TWELVE_DATA_API_KEY
    base_url: https://api.twelvedata.com
    source_interval: 1min
    poll_interval_sec: 60
    request_timeout_sec: 15
    max_retries: 0
    credit_budget_per_minute: 8
symbols:
  default:
    - AAPL
    - MSFT
    - NVDA
telegram:
  enabled: false
  token_env: TELEGRAM_BOT_TOKEN
  allowed_user_ids: []
  admin_user_ids: []
  allowed_chat_ids: []
input_control:
  request_ttl_sec: 600
  cli_online_timeout_sec: 45
  fastapi_online_timeout_sec: 45
  telegram_online_timeout_sec: 120
news:
  enabled: true
  mode: on_demand
  provider: placeholder
  api_key_env: NEWS_API_KEY
  cache_ttl_minutes: 30
llm:
  enabled: true
  provider: gemini
  model: gemini-3.5-flash
  fallback_model: null
  api_key_env: GEMINI_API_KEY
  base_url: https://generativelanguage.googleapis.com/v1beta/openai/
  request_timeout_sec: 60
  max_retries: 0
storage:
  sqlite_path: data/runtime/stock_agent.sqlite
  parquet_root: data/lake
  duckdb_path: data/analytics/stock_agent.duckdb
health:
  heartbeat_timeout_sec: 300
  data_delay_degraded_sec: 60
  data_delay_unhealthy_sec: 300
  error_rate_degraded: 0.01
  error_rate_unhealthy: 0.05
  consecutive_failure_unhealthy: 3
